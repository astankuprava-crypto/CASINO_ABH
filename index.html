<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Интернет-магазин</title>
<style>
    body { font-family: Arial; margin: 30px; }
    .hidden { display: none; }
    label { display: block; margin-top: 10px; }
    input, select { margin-top: 5px; padding: 6px; width: 260px; }
    button { margin-top: 15px; padding: 10px 20px; cursor: pointer; }
    .box { border: 1px solid #ccc; padding: 20px; margin-top: 20px; }
</style>
</head>
<body>

<h2>Интернет-магазин</h2>
<p><strong>Доставка по всей России</strong></p>

<!-- Кнопка для просмотра заказов в самом начале -->
<button onclick="viewOrders()">Посмотреть мои заказы</button>

<div id="order-form" class="box">

    <label>Выберите товар:
        <select id="product">
            <option value="">-- Выберите товар --</option>
            <option value="Телефон - 15000₽">Телефон - 15000₽</option>
            <option value="Наушники - 3000₽">Наушники - 3000₽</option>
            <option value="Ноутбук - 55000₽">Ноутбук - 55000₽</option>
        </select>
    </label>

    <label>Город:
        <input type="text" id="city" placeholder="Введите город">
    </label>

    <label>Адрес:
        <input type="text" id="address" placeholder="Введите адрес">
    </label>

    <label>Дата доставки:
        <input type="date" id="date">
    </label>

    <label>Время доставки:
        <input type="time" id="time">
    </label>

    <button onclick="placeOrder()">Заказать</button>
</div>

<div id="payment-form" class="box hidden">
    <h3>Оплата перевода</h3>

    <p>Переведите оплату на карту:</p>
    <p><strong id="card-number">0000 0000 0000 0000</strong></p>

    <label>Введите последние 4 цифры вашей карты:
        <input type="text" id="confirm-card" placeholder="1234">
    </label>

    <button onclick="payOrder()">Я оплатил</button>
</div>

<div id="summary" class="box hidden">
    <h3>✅ Заявка отправлена</h3>
    <p id="details"></p>
    <button onclick="backToOrder()">Вернуться к заказу</button>
    <button onclick="viewOrders()">Мои заказы</button>
</div>

<div id="orders-list" class="box hidden">
    <h3>📦 Мои заказы</h3>
    <ul id="orders-ul"></ul>
    <button onclick="backToOrder()">Вернуться к заказу</button>
</div>

<script>
// 🔹 Вставьте сюда свой номер карты
const YOUR_CARD_NUMBER = "1111 2222 3333 4444";
document.getElementById("card-number").innerText = YOUR_CARD_NUMBER;

// запрет выбора сегодняшней даты
const dateInput = document.getElementById('date');
const tomorrow = new Date();
tomorrow.setDate(tomorrow.getDate() + 1);
dateInput.min = tomorrow.toISOString().split('T')[0];

// оформление заказа
function placeOrder() {
    const product = document.getElementById('product').value;
    const city = document.getElementById('city').value.trim();
    const address = document.getElementById('address').value.trim();
    const date = document.getElementById('date').value;
    const time = document.getElementById('time').value;

    if (!product || !city || !address || !date || !time) {
        alert("Пожалуйста, заполните все поля.");
        return;
    }

    sessionStorage.setItem('currentOrder', JSON.stringify({
        product, city, address, date, time
    }));

    document.getElementById('order-form').classList.add('hidden');
    document.getElementById('payment-form').classList.remove('hidden');
}

// подтверждение оплаты
function payOrder() {
    const confirmCard = document.getElementById('confirm-card').value.trim();

    if (!confirmCard || confirmCard.length !== 4) {
        alert("Введите последние 4 цифры карты.");
        return;
    }

    document.getElementById('payment-form').classList.add('hidden');

    const order = JSON.parse(sessionStorage.getItem('currentOrder'));

    // сохраняем заказ в список всех заказов
    let orders = JSON.parse(sessionStorage.getItem('allOrders') || '[]');
    orders.push(order);
    sessionStorage.setItem('allOrders', JSON.stringify(orders));

    // показываем подтверждение
    document.getElementById('summary').classList.remove('hidden');
    document.getElementById('details').innerHTML = `
        <strong>Товар:</strong> ${order.product} <br><br>
        <strong>Город:</strong> ${order.city} <br>
        <strong>Адрес:</strong> ${order.address} <br>
        <strong>Дата доставки:</strong> ${order.date} <br>
        <strong>Время доставки:</strong> ${order.time} <br><br>
        Оплата получена.<br>
        Пожалуйста, ожидайте доставку.
    `;
}

// вернуться к оформлению нового заказа
function backToOrder() {
    document.getElementById('summary').classList.add('hidden');
    document.getElementById('orders-list').classList.add('hidden');
    document.getElementById('order-form').classList.remove('hidden');

    // очистка формы
    document.getElementById('product').value = "";
    document.getElementById('city').value = "";
    document.getElementById('address').value = "";
    document.getElementById('date').value = "";
    document.getElementById('time').value = "";
    document.getElementById('confirm-card').value = "";
}

// показать все заказы
function viewOrders() {
    document.getElementById('summary').classList.add('hidden');
    document.getElementById('order-form').classList.add('hidden');
    document.getElementById('payment-form').classList.add('hidden');

    const ordersDiv = document.getElementById('orders-list');
    const ordersUl = document.getElementById('orders-ul');
    ordersUl.innerHTML = "";

    const orders = JSON.parse(sessionStorage.getItem('allOrders') || '[]');
    if (orders.length === 0) {
        ordersUl.innerHTML = "<li>Заказов пока нет.</li>";
    } else {
        orders.forEach((order, index) => {
            ordersUl.innerHTML += `<li><strong>Заказ ${index+1}:</strong> ${order.product}, ${order.city}, ${order.address}, ${order.date} ${order.time}</li>`;
        });
    }

    ordersDiv.classList.remove('hidden');
}
</script>

</body>
</html>
